<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业级实时预测监控面板</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-panel: #0f1724;
    --border-color: #1e293b;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --accent-cyan: #06b6d4;
    --accent-orange: #f59e0b;
    --accent-red: #ef4444;
    --accent-green: #10b981;
    --accent-purple: #8b5cf6;
    --grid-color: rgba(30, 41, 59, 0.5);
    --warning-glow: rgba(239, 68, 68, 0.6);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', 'Microsoft YaHei', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 顶部导航栏 */
  .top-nav {
    height: 56px;
    background: var(--bg-secondary);
    border-bottom: 2px solid var(--border-color);
    display: flex;
    align-items: center;
    padding: 0 24px;
    justify-content: space-between;
    position: relative;
  }

  .top-nav::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
  }

  .nav-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent-cyan);
    text-transform: uppercase;
  }

  .mode-switcher {
    display: flex;
    gap: 8px;
    background: var(--bg-panel);
    padding: 4px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
  }

  .mode-btn {
    padding: 8px 20px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .mode-btn.active {
    background: var(--accent-cyan);
    color: #000;
    box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
  }

  .mode-btn:hover:not(.active) {
    color: var(--text-primary);
    background: rgba(255,255,255,0.05);
  }

  .model-switcher {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .model-btn {
    padding: 6px 14px;
    border: 1px solid var(--border-color);
    background: var(--bg-panel);
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.3s;
  }

  .model-btn.active {
    border-color: var(--accent-purple);
    color: var(--accent-purple);
    box-shadow: 0 0 8px rgba(139, 92, 246, 0.3);
  }

  /* 主内容区 */
  .main-container {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* 左侧波形区 */
  .waveform-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    min-width: 0;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-color);
  }

  .panel-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: var(--accent-cyan);
    border-radius: 2px;
  }

  .oscilloscope-container {
    flex: 1;
    background: var(--bg-panel);
    border: 2px solid var(--border-color);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }

  .oscilloscope-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 1;
  }

  .oscilloscope-svg {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
  }

  .channel-legend {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
    background: rgba(10, 14, 23, 0.8);
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .legend-line {
    width: 20px;
    height: 2px;
    border-radius: 1px;
  }

  .legend-line.dashed {
    background: repeating-linear-gradient(90deg, currentColor, currentColor 4px, transparent 4px, transparent 8px);
  }

  /* 右侧仪表盘区 */
  .dashboard-panel {
    width: 380px;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-left: 0;
    gap: 12px;
  }

  .dash-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 14px;
    position: relative;
    overflow: hidden;
  }

  .dash-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-cyan), transparent);
  }

  .dash-card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .gauge-container {
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .gauge-item {
    text-align: center;
  }

  .gauge-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-cyan);
    font-family: 'Courier New', monospace;
  }

  .gauge-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .gauge-svg {
    width: 100px;
    height: 60px;
  }

  /* 历史趋势图 */
  .trend-chart {
    height: 120px;
    width: 100%;
  }

  /* 统计指标 */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-item {
    background: rgba(255,255,255,0.02);
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'Courier New', monospace;
  }

  .stat-value.warning {
    color: var(--accent-orange);
  }

  .stat-value.danger {
    color: var(--accent-red);
    animation: pulse-red 1s infinite;
  }

  @keyframes pulse-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* 预警灯 */
  .alert-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-color);
  }

  .alert-light {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #334155;
    border: 2px solid #475569;
    transition: all 0.3s;
  }

  .alert-light.active {
    background: var(--accent-red);
    border-color: var(--accent-red);
    box-shadow: 0 0 12px var(--warning-glow);
    animation: blink-red 0.8s infinite;
  }

  @keyframes blink-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .alert-text {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .alert-text.active {
    color: var(--accent-red);
    font-weight: 700;
  }

  /* 拥堵热力图 */
  .heatmap-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-top: 8px;
  }

  .heatmap-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    transition: background 0.5s;
    position: relative;
  }

  .heatmap-cell::after {
    content: attr(data-lane);
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: rgba(255,255,255,0.7);
  }

  /* 底部状态栏 */
  .status-bar {
    height: 40px;
    background: var(--bg-secondary);
    border-top: 2px solid var(--border-color);
    display: flex;
    align-items: center;
    padding: 0 24px;
    justify-content: space-between;
    font-size: 12px;
  }

  .status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
  }

  .status-dot.disconnected {
    background: var(--accent-red);
    box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
  }

  .status-dot.connecting {
    background: var(--accent-orange);
    animation: blink-orange 1s infinite;
  }

  @keyframes blink-orange {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .throughput-bar {
    width: 100px;
    height: 4px;
    background: var(--border-color);
    border-radius: 2px;
    overflow: hidden;
  }

  .throughput-fill {
    height: 100%;
    background: var(--accent-cyan);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* 模型对比区 */
  .model-comparison {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .model-metric {
    flex: 1;
    text-align: center;
    padding: 8px;
    background: rgba(255,255,255,0.02);
    border-radius: 4px;
    border: 1px solid var(--border-color);
  }

  .model-name {
    font-size: 10px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .model-error {
    font-size: 14px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
  }

  /* 工作日/周末标识 */
  .day-type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 8px;
  }

  .day-type-badge.weekday {
    background: rgba(6, 182, 212, 0.15);
    color: var(--accent-cyan);
    border: 1px solid rgba(6, 182, 212, 0.3);
  }

  .day-type-badge.weekend {
    background: rgba(245, 158, 11, 0.15);
    color: var(--accent-orange);
    border: 1px solid rgba(245, 158, 11, 0.3);
  }

  /* AQI显示 */
  .aqi-display {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .aqi-value {
    font-size: 32px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
  }

  .aqi-level {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 700;
  }

  .aqi-good { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
  .aqi-moderate { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }
  .aqi-unhealthy { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

  /* 响应式 */
  @media (max-width: 1200px) {
    .dashboard-panel {
      width: 320px;
    }
  }

  @media (max-width: 900px) {
    .main-container {
      flex-direction: column;
    }
    .dashboard-panel {
      width: 100%;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .dash-card {
      flex: 1;
      min-width: 280px;
    }
  }

  /* 滚动条 */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg-primary);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border-color);
    border-radius: 3px;
  }
</style>
</head>
<body>

<!-- 顶部导航栏 -->
<nav class="top-nav">
  <div class="nav-title">工业级实时预测监控面板</div>
  <div class="mode-switcher">
    <button class="mode-btn active" data-mode="beijing" onclick="switchMode('beijing')">北京PM2.5监测</button>
    <button class="mode-btn" data-mode="california" onclick="switchMode('california')">加州高速车流</button>
  </div>
  <div class="model-switcher">
    <span style="font-size:11px;color:var(--text-secondary);margin-right:4px;">模型:</span>
    <button class="model-btn active" data-model="rnn" onclick="switchModel('rnn')">RNN</button>
    <button class="model-btn" data-model="gru" onclick="switchModel('gru')">GRU</button>
    <button class="model-btn" data-model="lstm" onclick="switchModel('lstm')">LSTM</button>
  </div>
</nav>

<!-- 主内容区 -->
<div class="main-container">
  <!-- 左侧波形区 -->
  <div class="waveform-panel">
    <div class="panel-header">
      <div class="panel-title" id="waveform-title">多通道实时波形</div>
      <div style="font-size:11px;color:var(--text-secondary);">
        <span id="day-type"></span>
      </div>
    </div>
    <div class="oscilloscope-container" id="oscilloscope">
      <svg class="oscilloscope-svg" id="main-svg"></svg>
      <div class="channel-legend" id="channel-legend"></div>
    </div>
  </div>

  <!-- 右侧仪表盘区 -->
  <div class="dashboard-panel">
    <!-- 实时数值仪表盘 -->
    <div class="dash-card">
      <div class="dash-card-title">实时数值监控</div>
      <div class="gauge-container" id="gauges"></div>
    </div>

    <!-- AQI / 拥堵指数 -->
    <div class="dash-card" id="index-card">
      <div class="dash-card-title" id="index-title">AQI指数</div>
      <div class="aqi-display" id="aqi-display">
        <div class="aqi-value" id="aqi-value">--</div>
        <div class="aqi-level" id="aqi-level">--</div>
      </div>
    </div>

    <!-- 预警指示 -->
    <div class="dash-card" id="alert-card">
      <div class="dash-card-title">系统预警</div>
      <div class="alert-indicator">
        <div class="alert-light" id="alert-light"></div>
        <div class="alert-text" id="alert-text">系统正常</div>
      </div>
    </div>

    <!-- 历史趋势 -->
    <div class="dash-card">
      <div class="dash-card-title">24小时历史趋势</div>
      <svg class="trend-chart" id="trend-svg"></svg>
    </div>

    <!-- 拥堵热力图 (仅加州模式) -->
    <div class="dash-card" id="heatmap-card" style="display:none;">
      <div class="dash-card-title">车道拥堵热力图</div>
      <div class="heatmap-container" id="heatmap"></div>
    </div>

    <!-- 统计指标 -->
    <div class="dash-card">
      <div class="dash-card-title">统计指标</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- 模型对比 -->
    <div class="dash-card">
      <div class="dash-card-title">模型误差对比</div>
      <div class="model-comparison" id="model-comparison"></div>
    </div>
  </div>
</div>

<!-- 底部状态栏 -->
<div class="status-bar">
  <div class="status-left">
    <div class="status-item">
      <div class="status-dot" id="conn-status"></div>
      <span id="conn-text">已连接</span>
    </div>
    <div class="status-item">
      <span>模型类型:</span>
      <span id="current-model" style="color:var(--accent-cyan);font-weight:700;">RNN</span>
    </div>
    <div class="status-item">
      <span>数据模式:</span>
      <span id="current-mode" style="color:var(--accent-cyan);font-weight:700;">北京PM2.5</span>
    </div>
  </div>
  <div class="status-right">
    <div class="status-item">
      <span>延迟:</span>
      <span id="latency-val" style="font-family:monospace;">-- ms</span>
    </div>
    <div class="status-item">
      <span>吞吐量:</span>
      <div class="throughput-bar">
        <div class="throughput-fill" id="throughput-fill" style="width:0%"></div>
      </div>
      <span id="throughput-val" style="font-family:monospace;">0 msg/s</span>
    </div>
    <div class="status-item">
      <span>数据点:</span>
      <span id="data-count" style="font-family:monospace;">0</span>
    </div>
  </div>
</div>

<script>
// ==================== 配置 ====================
const CONFIG = {
  beijing: {
    name: '北京PM2.5监测',
    wsEndpoint: 'wss://example.com/ws/beijing',
    channels: [
      { key: 'pm25', name: 'PM2.5', color: '#06b6d4', unit: 'μg/m³' },
      { key: 'wind', name: '风速', color: '#10b981', unit: 'm/s' },
      { key: 'temp', name: '温度', color: '#f59e0b', unit: '°C' },
      { key: 'humidity', name: '湿度', color: '#8b5cf6', unit: '%' }
    ],
    thresholds: { pm25: 150 },
    yRange: [0, 300]
  },
  california: {
    name: '加州高速车流',
    wsEndpoint: 'wss://example.com/ws/california',
    channels: [
      { key: 'lane1', name: '车道1', color: '#06b6d4', unit: '辆/h' },
      { key: 'lane2', name: '车道2', color: '#10b981', unit: '辆/h' },
      { key: 'lane3', name: '车道3', color: '#f59e0b', unit: '辆/h' },
      { key: 'lane4', name: '车道4', color: '#ef4444', unit: '辆/h' },
      { key: 'lane5', name: '车道5', color: '#8b5cf6', unit: '辆/h' }
    ],
    thresholds: { congestion: 0.7 },
    yRange: [0, 2000]
  }
};

const MODELS = ['rnn', 'gru', 'lstm'];
const MODEL_COLORS = {
  rnn: '#06b6d4',
  gru: '#f59e0b',
  lstm: '#8b5cf6'
};

// ==================== 状态 ====================
let currentMode = 'beijing';
let currentModel = 'rnn';
let ws = null;
let dataBuffer = [];
let historyData = [];
let maxHistory = 288; // 24h * 12 (每5分钟一个点)
let messageCount = 0;
let lastMessageTime = Date.now();
let animationId = null;

// 模拟数据生成器（当WebSocket不可用时使用）
let useMockData = false;
let mockInterval = null;

// ==================== 初始化 ====================
function init() {
  setupOscilloscope();
  setupGauges();
  setupStats();
  setupModelComparison();
  setupTrendChart();
  setupHeatmap();
  updateModeUI();
  connectWebSocket();
  startMockData();
  animate();
}

// ==================== 模式切换 ====================
function switchMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  document.getElementById('current-mode').textContent = CONFIG[mode].name;
  dataBuffer = [];
  historyData = [];
  updateModeUI();
  connectWebSocket();
}

function updateModeUI() {
  const cfg = CONFIG[currentMode];
  document.getElementById('waveform-title').textContent = currentMode === 'beijing' ? '多通道空气质量监测' : '多车道车流量监测';

  // AQI/拥堵指数卡片
  const indexCard = document.getElementById('index-card');
  const indexTitle = document.getElementById('index-title');
  const aqiDisplay = document.getElementById('aqi-display');

  if (currentMode === 'beijing') {
    indexTitle.textContent = 'AQI指数';
    aqiDisplay.style.display = 'flex';
    document.getElementById('heatmap-card').style.display = 'none';
  } else {
    indexTitle.textContent = '拥堵指数';
    aqiDisplay.style.display = 'flex';
    document.getElementById('heatmap-card').style.display = 'block';
  }

  // 预警卡片
  const alertCard = document.getElementById('alert-card');
  if (currentMode === 'beijing') {
    alertCard.querySelector('.dash-card-title').textContent = '沙尘暴预警';
  } else {
    alertCard.querySelector('.dash-card-title').textContent = '拥堵预警';
  }

  setupGauges();
  setupChannelLegend();
  updateDayType();
}

function updateDayType() {
  const now = new Date();
  const day = now.getDay();
  const isWeekend = day === 0 || day === 6;
  const badge = document.getElementById('day-type');
  if (currentMode === 'california') {
    badge.innerHTML = `<span class="day-type-badge ${isWeekend ? 'weekend' : 'weekday'}">${isWeekend ? '周末模式' : '工作日模式'}</span>`;
  } else {
    badge.innerHTML = '';
  }
}

// ==================== 模型切换 ====================
function switchModel(model) {
  if (model === currentModel) return;
  currentModel = model;
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.model === model);
  });
  document.getElementById('current-model').textContent = model.toUpperCase();
}

// ==================== WebSocket ====================
function connectWebSocket() {
  if (ws) {
    ws.close();
    ws = null;
  }

  const cfg = CONFIG[currentMode];
  updateConnectionStatus('connecting');

  if (!useMockData) {
    try {
      ws = new WebSocket(cfg.wsEndpoint);
      ws.onopen = () => updateConnectionStatus('connected');
      ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
      ws.onclose = () => updateConnectionStatus('disconnected');
      ws.onerror = () => updateConnectionStatus('disconnected');
    } catch (e) {
      updateConnectionStatus('disconnected');
    }
  }
}

function updateConnectionStatus(status) {
  const dot = document.getElementById('conn-status');
  const text = document.getElementById('conn-text');
  dot.className = 'status-dot';
  if (status === 'connected') {
    dot.classList.add('connected');
    text.textContent = '已连接';
    text.style.color = 'var(--accent-green)';
  } else if (status === 'connecting') {
    dot.classList.add('connecting');
    text.textContent = '连接中...';
    text.style.color = 'var(--accent-orange)';
  } else {
    dot.classList.add('disconnected');
    text.textContent = '未连接';
    text.style.color = 'var(--accent-red)';
  }
}

// ==================== 模拟数据 ====================
function startMockData() {
  if (mockInterval) clearInterval(mockInterval);
  mockInterval = setInterval(() => {
    const data = generateMockData();
    handleMessage(data);
  }, 200);
}

function generateMockData() {
  const t = Date.now() / 1000;
  if (currentMode === 'beijing') {
    const basePM25 = 80 + Math.sin(t / 3600) * 40 + Math.random() * 30;
    return {
      timestamp: Date.now(),
      pm25: Math.max(0, basePM25),
      wind: 2 + Math.random() * 6,
      temp: 15 + Math.sin(t / 86400 * 2 * Math.PI) * 10 + Math.random() * 3,
      humidity: 40 + Math.random() * 40,
      predictions: {
        rnn: Math.max(0, basePM25 + (Math.random() - 0.5) * 20),
        gru: Math.max(0, basePM25 + (Math.random() - 0.5) * 15),
        lstm: Math.max(0, basePM25 + (Math.random() - 0.5) * 10)
      },
      errors: {
        rnn: Math.random() * 15 + 5,
        gru: Math.random() * 10 + 3,
        lstm: Math.random() * 8 + 2
      }
    };
  } else {
    const baseFlow = 800 + Math.sin(t / 3600) * 400;
    const isWeekend = new Date().getDay() === 0 || new Date().getDay() === 6;
    const multiplier = isWeekend ? 0.6 : 1.0;
    return {
      timestamp: Date.now(),
      lane1: Math.max(0, baseFlow * multiplier + Math.random() * 200),
      lane2: Math.max(0, baseFlow * multiplier * 0.9 + Math.random() * 200),
      lane3: Math.max(0, baseFlow * multiplier * 0.85 + Math.random() * 200),
      lane4: Math.max(0, baseFlow * multiplier * 0.8 + Math.random() * 200),
      lane5: Math.max(0, baseFlow * multiplier * 0.75 + Math.random() * 200),
      predictions: {
        rnn: Math.max(0, baseFlow * multiplier + (Math.random() - 0.5) * 100),
        gru: Math.max(0, baseFlow * multiplier + (Math.random() - 0.5) * 80),
        lstm: Math.max(0, baseFlow * multiplier + (Math.random() - 0.5) * 60)
      },
      errors: {
        rnn: Math.random() * 50 + 20,
        gru: Math.random() * 40 + 15,
        lstm: Math.random() * 30 + 10
      },
      congestionIndex: Math.random() * 0.8 + 0.1
    };
  }
}

function handleMessage(data) {
  messageCount++;
  const now = Date.now();
  const latency = now - data.timestamp;
  document.getElementById('latency-val').textContent = latency + ' ms';
  document.getElementById('data-count').textContent = messageCount;

  // 吞吐量
  const throughput = 1000 / (now - lastMessageTime);
  lastMessageTime = now;
  const throughputPercent = Math.min(100, throughput / 10 * 100);
  document.getElementById('throughput-fill').style.width = throughputPercent + '%';
  document.getElementById('throughput-val').textContent = throughput.toFixed(1) + ' msg/s';

  dataBuffer.push(data);
  if (dataBuffer.length > 200) dataBuffer.shift();

  // 历史数据（每5分钟一个点）
  if (historyData.length === 0 || now - historyData[historyData.length - 1].timestamp > 300000) {
    historyData.push({
      timestamp: now,
      value: currentMode === 'beijing' ? data.pm25 : (data.lane1 + data.lane2 + data.lane3) / 3
    });
    if (historyData.length > maxHistory) historyData.shift();
  }

  updateGauges(data);
  updateIndex(data);
  updateAlert(data);
  updateStats(data);
  updateModelComparison(data);
  updateTrendChart();
  if (currentMode === 'california') updateHeatmap(data);
}

function animate() {
  drawWaveform();
  animationId = requestAnimationFrame(animate);
}

function drawWaveform() {
  if (dataBuffer.length < 2) return;

  const svg = d3.select('#main-svg');
  const cfg = CONFIG[currentMode];

  // 更新Y轴范围
  const allValues = dataBuffer.flatMap(d => cfg.channels.map(ch => d[ch.key]));
  const minVal = Math.min(...allValues);
  const maxVal = Math.max(...allValues);
  const padding = (maxVal - minVal) * 0.1;
  yScale.domain([Math.max(0, minVal - padding), maxVal + padding]);

  // 清除旧波形
  svg.selectAll('.waveform').remove();

  // 绘制各通道
  cfg.channels.forEach(ch => {
    const line = d3.line()
      .x((d, i) => xScale(i))
      .y(d => yScale(d[ch.key]))
      .curve(d3.curveMonotoneX);

    svg.append('path')
      .datum(dataBuffer)
      .attr('class', 'waveform')
      .attr('fill', 'none')
      .attr('stroke', ch.color)
      .attr('stroke-width', 1.5)
      .attr('d', line);
  });

  // 绘制模型预测线
  if (dataBuffer[0].predictions) {
    MODELS.forEach(model => {
      const predKey = currentMode === 'beijing' ? 'pm25' : 'lane1';
      const line = d3.line()
        .x((d, i) => xScale(i))
        .y(d => yScale(d.predictions[model]))
        .curve(d3.curveMonotoneX);

      svg.append('path')
        .datum(dataBuffer)
        .attr('class', 'waveform')
        .attr('fill', 'none')
        .attr('stroke', MODEL_COLORS[model])
        .attr('stroke-width', 1.5)
        .attr('stroke-dasharray', '6,4')
        .attr('opacity', 0.8)
        .attr('d', line);
    });
  }
}

// ==================== 仪表盘 ====================
function setupGauges() {
  const container = document.getElementById('gauges');
  const cfg = CONFIG[currentMode];
  container.innerHTML = '';

  cfg.channels.slice(0, 3).forEach(ch => {
    const item = document.createElement('div');
    item.className = 'gauge-item';
    item.innerHTML = `
      <svg class="gauge-svg" id="gauge-${ch.key}"></svg>
      <div class="gauge-value" id="value-${ch.key}">--</div>
      <div class="gauge-label">${ch.name} (${ch.unit})</div>
    `;
    container.appendChild(item);
  });

  // 绘制半圆仪表盘
  cfg.channels.slice(0, 3).forEach(ch => {
    const svg = d3.select(`#gauge-${ch.key}`);
    const width = 100, height = 60;
    const arc = d3.arc()
      .innerRadius(25)
      .outerRadius(35)
      .startAngle(-Math.PI / 2)
      .cornerRadius(2);

    const bgArc = arc.endAngle(Math.PI / 2);
    svg.append('path')
      .attr('d', bgArc)
      .attr('transform', `translate(${width/2}, ${height-10})`)
      .attr('fill', 'var(--border-color)');

    svg.append('path')
      .attr('class', `gauge-arc-${ch.key}`)
      .attr('transform', `translate(${width/2}, ${height-10})`)
      .attr('fill', ch.color);
  });
}

function updateGauges(data) {
  const cfg = CONFIG[currentMode];
  cfg.channels.forEach(ch => {
    const val = data[ch.key];
    const el = document.getElementById(`value-${ch.key}`);
    if (el) el.textContent = val.toFixed(1);

    // 更新仪表盘弧度
    const arc = d3.arc()
      .innerRadius(25)
      .outerRadius(35)
      .startAngle(-Math.PI / 2)
      .cornerRadius(2);

    const maxVal = cfg.yRange[1];
    const angle = -Math.PI / 2 + (val / maxVal) * Math.PI;
    const endAngle = Math.min(Math.PI / 2, angle);

    d3.select(`.gauge-arc-${ch.key}`)
      .transition().duration(200)
      .attr('d', arc.endAngle(endAngle));
  });
}

// ==================== AQI / 拥堵指数 ====================
function updateIndex(data) {
  if (currentMode === 'beijing') {
    const pm25 = data.pm25;
    const aqi = calculateAQI(pm25);
    const aqiValue = document.getElementById('aqi-value');
    const aqiLevel = document.getElementById('aqi-level');

    aqiValue.textContent = Math.round(aqi);
    aqiValue.style.color = getAQIColor(aqi);

    let level, className;
    if (aqi <= 50) { level = '优'; className = 'aqi-good'; }
    else if (aqi <= 100) { level = '良'; className = 'aqi-moderate'; }
    else { level = '污染'; className = 'aqi-unhealthy'; }

    aqiLevel.textContent = level;
    aqiLevel.className = 'aqi-level ' + className;
  } else {
    const congestion = data.congestionIndex || 0.5;
    const idxValue = document.getElementById('aqi-value');
    const idxLevel = document.getElementById('aqi-level');

    idxValue.textContent = (congestion * 10).toFixed(1);
    idxValue.style.color = congestion > 0.7 ? 'var(--accent-red)' : (congestion > 0.4 ? 'var(--accent-orange)' : 'var(--accent-green)');

    let level, className;
    if (congestion < 0.3) { level = '畅通'; className = 'aqi-good'; }
    else if (congestion < 0.6) { level = '缓行'; className = 'aqi-moderate'; }
    else { level = '拥堵'; className = 'aqi-unhealthy'; }

    idxLevel.textContent = level;
    idxLevel.className = 'aqi-level ' + className;
  }
}

function calculateAQI(pm25) {
  // 简化的AQI计算
  if (pm25 <= 35) return pm25 * 50 / 35;
  if (pm25 <= 75) return 50 + (pm25 - 35) * 50 / 40;
  if (pm25 <= 115) return 100 + (pm25 - 75) * 50 / 40;
  if (pm25 <= 150) return 150 + (pm25 - 115) * 50 / 35;
  if (pm25 <= 250) return 200 + (pm25 - 150) * 100 / 100;
  return 300 + (pm25 - 250) * 100 / 150;
}

function getAQIColor(aqi) {
  if (aqi <= 50) return 'var(--accent-green)';
  if (aqi <= 100) return 'var(--accent-orange)';
  return 'var(--accent-red)';
}

// ==================== 预警 ====================
function updateAlert(data) {
  const light = document.getElementById('alert-light');
  const text = document.getElementById('alert-text');

  let isAlert = false;
  let alertMsg = '系统正常';

  if (currentMode === 'beijing') {
    const pm25 = data.pm25;
    const predPM25 = data.predictions ? data.predictions[currentModel] : 0;
    if (predPM25 > CONFIG.beijing.thresholds.pm25) {
      isAlert = true;
      alertMsg = '沙尘暴预警：预测PM2.5超标';
    }
  } else {
    const congestion = data.congestionIndex || 0;
    if (congestion > CONFIG.california.thresholds.congestion) {
      isAlert = true;
      alertMsg = '拥堵预警：道路严重拥堵';
    }
  }

  light.classList.toggle('active', isAlert);
  text.textContent = alertMsg;
  text.classList.toggle('active', isAlert);
}

// ==================== 统计指标 ====================
function setupStats() {
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';

  const stats = currentMode === 'beijing'
    ? [
        { label: 'PM2.5均值', key: 'pm25_avg' },
        { label: '最大风速', key: 'wind_max' },
        { label: '温度范围', key: 'temp_range' },
        { label: '平均湿度', key: 'humidity_avg' }
      ]
    : [
        { label: '总车流量', key: 'total_flow' },
        { label: '峰值车道', key: 'peak_lane' },
        { label: '平均车速', key: 'avg_speed' },
        { label: '拥堵时长', key: 'congestion_time' }
      ];

  stats.forEach(stat => {
    const item = document.createElement('div');
    item.className = 'stat-item';
    item.innerHTML = `
      <div class="stat-label">${stat.label}</div>
      <div class="stat-value" id="stat-${stat.key}">--</div>
    `;
    grid.appendChild(item);
  });
}

function updateStats(data) {
  if (dataBuffer.length === 0) return;

  if (currentMode === 'beijing') {
    const pm25Values = dataBuffer.map(d => d.pm25);
    const windValues = dataBuffer.map(d => d.wind);
    const tempValues = dataBuffer.map(d => d.temp);
    const humidityValues = dataBuffer.map(d => d.humidity);

    document.getElementById('stat-pm25_avg').textContent = (pm25Values.reduce((a,b) => a+b, 0) / pm25Values.length).toFixed(1) + ' μg/m³';
    document.getElementById('stat-wind_max').textContent = Math.max(...windValues).toFixed(1) + ' m/s';
    document.getElementById('stat-temp_range').textContent = Math.min(...tempValues).toFixed(1) + '~' + Math.max(...tempValues).toFixed(1) + ' °C';
    document.getElementById('stat-humidity_avg').textContent = (humidityValues.reduce((a,b) => a+b, 0) / humidityValues.length).toFixed(1) + '%';
  } else {
    const totalFlow = data.lane1 + data.lane2 + data.lane3 + data.lane4 + data.lane5;
    const lanes = [
      { name: '车道1', val: data.lane1 },
      { name: '车道2', val: data.lane2 },
      { name: '车道3', val: data.lane3 },
      { name: '车道4', val: data.lane4 },
      { name: '车道5', val: data.lane5 }
    ];
    const peakLane = lanes.reduce((a,b) => a.val > b.val ? a : b);

    document.getElementById('stat-total_flow').textContent = Math.round(totalFlow) + ' 辆/h';
    document.getElementById('stat-peak_lane').textContent = peakLane.name;
    document.getElementById('stat-avg_speed').textContent = (60 - data.congestionIndex * 40).toFixed(1) + ' km/h';
    document.getElementById('stat-congestion_time').textContent = Math.round(data.congestionIndex * 60) + ' min';
  }
}

// ==================== 模型对比 ====================
function setupModelComparison() {
  const container = document.getElementById('model-comparison');
  container.innerHTML = '';

  MODELS.forEach(model => {
    const item = document.createElement('div');
    item.className = 'model-metric';
    item.innerHTML = `
      <div class="model-name">${model.toUpperCase()}</div>
      <div class="model-error" id="error-${model}" style="color:${MODEL_COLORS[model]}">--</div>
    `;

function updateModelComparison(data) {
  if (!data.errors) return;
  MODELS.forEach(model => {
    const el = document.getElementById(`error-${model}`);
    if (el) el.textContent = data.errors[model].toFixed(2);
  });
}

// ==================== 历史趋势 ====================
function setupTrendChart() {
  const svg = d3.select('#trend-svg');
  svg.attr('viewBox', '0 0 350 120');
}

function updateTrendChart() {
  if (historyData.length < 2) return;

  const svg = d3.select('#trend-svg');
  svg.selectAll('*').remove();

  const width = 350, height = 120;
  const margin = { top: 10, right: 10, bottom: 20, left: 40 };

  const x = d3.scaleTime()
    .domain(d3.extent(historyData, d => d.timestamp))
    .range([margin.left, width - margin.right]);

  const y = d3.scaleLinear()
    .domain(d3.extent(historyData, d => d.value))
    .nice()
    .range([height - margin.bottom, margin.top]);

  // 区域填充
  const area = d3.area()
    .x(d => x(d.timestamp))
    .y0(height - margin.bottom)
    .y1(d => y(d.value))
    .curve(d3.curveMonotoneX);

  svg.append('path')
    .datum(historyData)
    .attr('fill', currentMode === 'beijing' ? 'rgba(6,182,212,0.15)' : 'rgba(245,158,11,0.15)')
    .attr('d', area);

  // 线条
  const line = d3.line()
    .x(d => x(d.timestamp))
    .y(d => y(d.value))
    .curve(d3.curveMonotoneX);

  svg.append('path')
    .datum(historyData)
    .attr('fill', 'none')
    .attr('stroke', currentMode === 'beijing' ? 'var(--accent-cyan)' : 'var(--accent-orange)')
    .attr('stroke-width', 1.5)
    .attr('d', line);

  // 轴
  svg.append('g')
    .attr('transform', `translate(0,${height - margin.bottom})`)
    .call(d3.axisBottom(x).ticks(4).tickFormat(d3.timeFormat('%H:%M')))
    .selectAll('text').attr('fill', 'var(--text-secondary)').attr('font-size', '9px');

  svg.append('g')
    .attr('transform', `translate(${margin.left},0)`)
    .call(d3.axisLeft(y).ticks(3))
    .selectAll('text').attr('fill', 'var(--text-secondary)').attr('font-size', '9px');

  svg.selectAll('.domain, .tick line').attr('stroke', 'var(--border-color)');
}

// ==================== 拥堵热力图 ====================
function setupHeatmap() {
  const container = document.getElementById('heatmap');
  container.innerHTML = '';

  for (let i = 1; i <= 5; i++) {
    const cell = document.createElement('div');
    cell.className = 'heatmap-cell';
    cell.dataset.lane = i;
    cell.id = `heatmap-lane${i}`;
    container.appendChild(cell);
  }
}

function updateHeatmap(data) {
  const lanes = ['lane1', 'lane2', 'lane3', 'lane4', 'lane5'];
  const maxFlow = 2000;

  lanes.forEach((lane, idx) => {
    const cell = document.getElementById(`heatmap-lane${idx + 1}`);
    if (!cell) return;

    const ratio = data[lane] / maxFlow;
    let color;
    if (ratio < 0.3) color = '#10b981';
    else if (ratio < 0.6) color = '#f59e0b';
    else color = '#ef4444';

    cell.style.background = color;
    cell.style.opacity = 0.3 + ratio * 0.7;
  });
}
